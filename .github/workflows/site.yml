name: site

on:
  schedule:
    - cron: "0 10 * * 1-5"  # ~07:00 BRT, dias úteis
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Instalar dependências
        run: uv sync

      # cache do banco local entre execuções: o `scout atualizar` só rebaixa
      # os 2 últimos anos, então o cache poupa ~20 downloads da CVM por dia
      - name: Cache da base de dados
        uses: actions/cache@v4
        with:
          path: ~/.scout/scout.db
          key: scout-db-${{ github.run_id }}
          restore-keys: |
            scout-db-
            fato-db-

      # se a CVM estiver fora do ar (janela de manutenção), publica com o cache
      # do dia anterior em vez de derrubar o deploy — as páginas mostram a data
      # dos dados; sem cache nenhum, o passo seguinte falha e nada é publicado
      - name: Atualizar dados da CVM
        continue-on-error: true
        run: uv run scout atualizar

      # analytics sem cookie (GoatCounter): defina a variável de repositório
      # SCOUT_ANALYTICS com o código (subdomínio) em Settings → Secrets and
      # variables → Actions → Variables. Vazia = nenhum rastreio (padrão).
      - name: Gerar site
        env:
          SCOUT_ANALYTICS: ${{ vars.SCOUT_ANALYTICS }}
        run: uv run scout site --destino _site --leituras leituras

      - name: Publicar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
